services:

  db:
    container_name: postgres
    image: postgres:latest
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PW:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/docker-entrypoint-initdb.d/
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  db_setup:
    container_name: db_setup
    build:
      context: .
      dockerfile: Dockerfile
      target: db_setup
    user: "${UID}:${GID}"  # run with current user to preserve version file permissions
    environment:
      - SERVICE_NAME=db_setup
      - POSTGRES_HOST=${POSTGRES_HOST:-db}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PW:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-postgres}
      - POSTGRES_DRIVER=${POSTGRES_SETUP_DRIVER:-psycopg}
    command: ["uv", "run", "alembic", "upgrade", "head"]
    volumes:
      - ./packages/common:/workspace/packages/common
      - ./packages/db_setup:/workspace/packages/db_setup
    depends_on:
      db:
        condition: service_healthy
        restart: true

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: api
    environment:
      - SERVICE_NAME=api
      - POSTGRES_HOST=${POSTGRES_HOST:-db}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PW:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-postgres}
      - POSTGRES_DRIVER=${POSTGRES_DRIVER:-asyncpg}
    command: ["uv", "run", "uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    ports:
      - "8000:8000"
    healthcheck:
      test: curl -f http://localhost:8000/health/ || exit 1
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    volumes:
      - ./packages/common:/workspace/packages/common
      - ./packages/api:/workspace/packages/api
      - ./logs:/workspace/logs
    depends_on:
      db_setup:
        condition: service_completed_successfully

  pgadmin:
    image: dpage/pgadmin4:9.12
    ports:
      - 5050:80
    environment:
      # Required by pgAdmin
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin

      # Don't require the user to login
      PGADMIN_CONFIG_SERVER_MODE: 'False'

      # Don't require a "master" password after logging in
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'

      PGADMIN_SERVERS_JSON: |
        {
          "Servers": {
            "1": {
              "Name": "Local Postgres",
              "Group": "Servers",
              "Host": "db",
              "Port": 5432,
              "MaintenanceDB": "${POSTGRES_DB:-postgres}",
              "Username": "${POSTGRES_USER:-postgres}",
              "Password": "${POSTGRES_PW:-postgres}",
              "SSLMode": "prefer"
            }
          }
        }
    depends_on:
      - db
    volumes:
      - pgadmin-data:/var/lib/pgadmin/

volumes:
  postgres-data: 
  pgadmin-data: 