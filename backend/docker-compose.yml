services:

  db:
    container_name: postgres
    image: postgres:latest
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PW:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/docker-entrypoint-initdb.d/
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: api
    command: uv run uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    healthcheck:
      test: curl -f http://localhost:8000/health/ || exit 1
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    volumes:
      - ./packages/common:/workspace/packages/common
      - ./packages/api:/workspace/packages/api
    depends_on:
      - db

  pgadmin:
    image: dpage/pgadmin4:9.12
    ports:
      - 5050:80
    environment:
      # Required by pgAdmin
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin

      # Don't require the user to login
      PGADMIN_CONFIG_SERVER_MODE: 'False'

      # Don't require a "master" password after logging in
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'

      PGADMIN_SERVERS_JSON: |
        {
          "Servers": {
            "1": {
              "Name": "Local Postgres",
              "Group": "Servers",
              "Host": "db",
              "Port": 5432,
              "MaintenanceDB": "${POSTGRES_DB:-postgres}",
              "Username": "${POSTGRES_USER:-postgres}",
              "Password": "${POSTGRES_PW:-postgres}",
              "SSLMode": "prefer"
            }
          }
        }
    depends_on:
      - db
    volumes:
      - pgadmin-data:/var/lib/pgadmin/

volumes:
  postgres-data: 
  pgadmin-data: 