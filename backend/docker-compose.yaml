services:
  # Support services
  db:
    container_name: postgres
    image: postgres:latest
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PW:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/docker-entrypoint-initdb.d/
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  kafka:
    image: apache/kafka:3.9.2
    hostname: kafka
    container_name: kafka
    ports:
      - 9092:9092
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka_data:/var/lib/kafka/data

  # Setup services
  db_setup:
    container_name: db_setup
    build:
      context: .
      dockerfile: Dockerfile
      target: db_setup
    user: "${UID}:${GID}"  # run with current user to preserve version file permissions
    environment:
      - SERVICE_NAME=db_setup
      - POSTGRES_HOST=${POSTGRES_HOST:-db}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PW:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-postgres}
      - POSTGRES_DRIVER=${POSTGRES_SETUP_DRIVER:-psycopg}
    command: ["uv", "run", "alembic", "upgrade", "head"]
    volumes:
      - ./packages/common:/workspace/packages/common
      - ./packages/db_setup:/workspace/packages/db_setup
    depends_on:
      db:
        condition: service_healthy
        restart: true

  # Main services
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: api
    environment:
      - SERVICE_NAME=api
      - POSTGRES_HOST=${POSTGRES_HOST:-db}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PW:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-postgres}
      - POSTGRES_DRIVER=${POSTGRES_DRIVER:-asyncpg}
      - KAFKA_BROKERS=${KAFKA_BROKERS:-["kafka://kafka:9092"]}
    command: ["uv", "run", "uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 45s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    volumes:
      - ./packages/common:/workspace/packages/common
      - ./packages/api:/workspace/packages/api
      - ./logs:/workspace/logs
    depends_on:
      db:
        condition: service_healthy
      db_setup:
        condition: service_completed_successfully
      kafka:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    container_name: worker
    environment:
      - SERVICE_NAME=worker
      - POSTGRES_HOST=${POSTGRES_HOST:-db}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PW:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-postgres}
      - POSTGRES_DRIVER=${POSTGRES_DRIVER:-asyncpg}
      - KAFKA_BROKERS=${KAFKA_BROKERS:-["kafka://kafka:9092"]}
    command: ["uv", "run", "faust", "-A", "worker.main:app", "worker", "-l", "info"]
    ports:
      - "6066:6066"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:6066')"]
      interval: 45s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    volumes:
      - ./packages/common:/workspace/packages/common
      - ./packages/worker:/workspace/packages/worker
      - ./logs:/workspace/logs
    depends_on:
      db:
        condition: service_healthy
      db_setup:
        condition: service_completed_successfully
      kafka:
        condition: service_started

  # UI services
  pgadmin:
    image: dpage/pgadmin4:9.12
    ports:
      - 5050:80
    environment:
      # Required by pgAdmin
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin

      # Don't require the user to login
      PGADMIN_CONFIG_SERVER_MODE: 'False'

      # Don't require a "master" password after logging in
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'

      PGADMIN_SERVERS_JSON: |
        {
          "Servers": {
            "1": {
              "Name": "Local Postgres",
              "Group": "Servers",
              "Host": "db",
              "Port": 5432,
              "MaintenanceDB": "${POSTGRES_DB:-postgres}",
              "Username": "${POSTGRES_USER:-postgres}",
              "Password": "${POSTGRES_PW:-postgres}",
              "SSLMode": "prefer"
            }
          }
        }
    depends_on:
      - db
    volumes:
      - pgadmin-data:/var/lib/pgadmin/

  kafka-ui:
    image: kafbat/kafka-ui:main
    ports:
      - 8080:8080
    environment:
      DYNAMIC_CONFIG_ENABLED: "true"
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_started

volumes:
  postgres-data:
  kafka_data: 
  pgadmin-data: 