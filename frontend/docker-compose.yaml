services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    container_name: frontend
    environment:
      SERVICE_NAME: frontend
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "http://0.0.0.0:3000"]
      interval: 45s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
